name: Branch Release Pipeline

on:
  push:
    branches:
      - main
      - app

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

concurrency:
  group: branch-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    env:
      MIRROR_TARGET_REPO: simplegear-org/peerlink
      MIRROR_INCLUDE: |
        lib
        assets
        pubspec.yaml
        LICENSE
        AI_CONTEXT_RU.md
        AI_CONTEXT.md
        ARCHITECTURE_RU.md
        ARCHITECTURE.md
        BOOTSTRAP_SIGNALING_PROTOCOL_RU.md
        BOOTSTRAP_SIGNALING_PROTOCOL.md
        CHANGELOG_RU.md
        CHANGELOG.md
        RELEASE_CHECKLIST_RU.md
        RELEASE_CHECKLIST.md
        GROUP_BLOB_V1_SPEC_RU.md
        GROUP_BLOB_V1_SPEC.md
        NETWORK_FLOW_RU.md
        NETWORK_FLOW.md
        README_RU.md
        README.md
        RELAY_PROTOCOL_RU.md
        RELAY_PROTOCOL.md
        SECURITY_MODEL_RU.md
        SECURITY_MODEL.md
        TASKS_RU.md
        TASKS.md
        VERSIONING_RU.md
        VERSIONING.md
        .github
        tool
    outputs:
      version: ${{ steps.version.outputs.version }}
      release_type: ${{ steps.release_type.outputs.release_type }}
      release_sha: ${{ github.sha }}
      branch_name: ${{ steps.branch.outputs.branch_name }}
      release_notes_source: ${{ steps.release_notes_en.outputs.release_notes_source }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Determine branch name
        id: branch
        run: echo "branch_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Detect release type from merge commit
        id: release_type
        run: |
          chmod +x tool/detect_release_type.sh
          TYPE="$(tool/detect_release_type.sh "$(git log -1 --pretty=%B)")"
          echo "release_type=${TYPE}" >> "$GITHUB_OUTPUT"
          echo "Detected release type: ${TYPE}"

      - name: Read version from pubspec
        id: version
        run: |
          VERSION="$(grep '^version:' pubspec.yaml | head -n1 | awk '{print $2}')"
          if [[ -z "${VERSION:-}" ]]; then
            echo "Failed to read version from pubspec.yaml" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Using existing version ${VERSION}"

      - name: Run analyzer
        run: flutter analyze

      - name: Render release notes (EN)
        id: release_notes_en
        run: |
          chmod +x tool/render_release_notes.sh
          mkdir -p build/release_notes
          tool/render_release_notes.sh "${{ steps.version.outputs.version }}" --lang en > build/release_notes/release_notes_en.md

      - name: Render release notes (RU)
        id: release_notes_ru
        run: |
          chmod +x tool/render_release_notes.sh
          mkdir -p build/release_notes
          tool/render_release_notes.sh "${{ steps.version.outputs.version }}" --lang ru > build/release_notes/release_notes_ru.md

      - name: Upload release notes artifact (EN)
        uses: actions/upload-artifact@v4
        with:
          name: release-notes-${{ steps.version.outputs.version }}
          path: build/release_notes/release_notes_en.md

      - name: Upload release notes artifact (RU)
        uses: actions/upload-artifact@v4
        with:
          name: release-notes-ru-${{ steps.version.outputs.version }}
          path: build/release_notes/release_notes_ru.md

      - name: Append release notes to workflow summary
        run: |
          {
            echo "## Release Notes Rendering"
            echo
            echo "- EN template source: \`.github/release-template.md\`"
            echo "- RU template source: \`.github/release-template-ru.md\`"
            echo "- EN rendered output: \`build/release_notes/release_notes_en.md\`"
            echo "- RU rendered output: \`build/release_notes/release_notes_ru.md\`"
            echo
            echo "## Release Notes (EN)"
            echo
            echo "- Version: \`${{ steps.version.outputs.version }}\`"
            echo "- Release type marker: \`${{ steps.release_type.outputs.release_type }}\`"
            echo "- Source: \`${{ steps.release_notes_en.outputs.release_notes_source || 'CHANGELOG' }}\`"
            echo
            cat build/release_notes/release_notes_en.md
            echo
            echo "## Release Notes (RU)"
            echo
            echo "- Version: \`${{ steps.version.outputs.version }}\`"
            echo "- Release type marker: \`${{ steps.release_type.outputs.release_type }}\`"
            echo "- Source: \`${{ steps.release_notes_ru.outputs.release_notes_source || 'CHANGELOG' }}\`"
            echo
            cat build/release_notes/release_notes_ru.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Mirror selected files
        env:
          MIRROR_REPO_TOKEN: ${{ secrets.MIRROR_REPO_TOKEN }}
        run: |
          chmod +x tool/mirror_subset.sh
          tool/mirror_subset.sh "${{ steps.branch.outputs.branch_name }}"

  android:
    needs: prepare
    if: ${{ needs.prepare.outputs.branch_name == 'app' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release commit
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.release_sha }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Materialize Android Firebase config
        env:
          ANDROID_GOOGLE_SERVICES_JSON_B64: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_B64 }}
        run: |
          if [[ -z "${ANDROID_GOOGLE_SERVICES_JSON_B64:-}" ]]; then
            echo "Missing secret ANDROID_GOOGLE_SERVICES_JSON_B64" >&2
            exit 1
          fi
          mkdir -p android/app
          echo "$ANDROID_GOOGLE_SERVICES_JSON_B64" | base64 --decode > android/app/google-services.json

      - name: Configure Android release signing for app branch
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [[ -z "${ANDROID_KEYSTORE_B64:-}" || -z "${ANDROID_KEYSTORE_PASSWORD:-}" || -z "${ANDROID_KEY_ALIAS:-}" || -z "${ANDROID_KEY_PASSWORD:-}" ]]; then
            echo "Missing Android signing secrets for app branch deploy" >&2
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_B64" | base64 --decode > android/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=${ANDROID_KEYSTORE_PASSWORD}
          keyPassword=${ANDROID_KEY_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          storeFile=upload-keystore.jks
          EOF

      - name: Get dependencies
        run: flutter pub get

      - name: Build Android App Bundle
        run: flutter build appbundle --release

      - name: Upload Android AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab-${{ needs.prepare.outputs.version }}
          path: build/app/outputs/bundle/release/app-release.aab

      - name: Resolve Android application id
        id: android_meta
        env:
          ANDROID_APPLICATION_ID: ${{ secrets.ANDROID_APPLICATION_ID }}
        run: |
          PACKAGE_NAME="${ANDROID_APPLICATION_ID:-org.simplegear.peerlink}"
          echo "package_name=${PACKAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Deploy Android to Google Play internal
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ steps.android_meta.outputs.package_name }}
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed

  ios:
    needs: prepare
    if: ${{ needs.prepare.outputs.branch_name == 'app' }}
    runs-on: macos-latest
    steps:
      - name: Checkout release commit
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.release_sha }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Materialize iOS Firebase config
        env:
          IOS_GOOGLE_SERVICE_INFO_PLIST_B64: ${{ secrets.IOS_GOOGLE_SERVICE_INFO_PLIST_B64 }}
        run: |
          if [[ -z "${IOS_GOOGLE_SERVICE_INFO_PLIST_B64:-}" ]]; then
            echo "Missing secret IOS_GOOGLE_SERVICE_INFO_PLIST_B64" >&2
            exit 1
          fi
          mkdir -p ios/Runner
          echo "$IOS_GOOGLE_SERVICE_INFO_PLIST_B64" | base64 --decode > ios/Runner/GoogleService-Info.plist

      - name: Get dependencies
        run: flutter pub get

      - name: Configure iOS signing for app branch
        env:
          IOS_CERTIFICATE_P12_B64: ${{ secrets.IOS_CERTIFICATE_P12_B64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_B64: ${{ secrets.IOS_PROVISIONING_PROFILE_B64 }}
          IOS_EXPORT_OPTIONS_PLIST_B64: ${{ secrets.IOS_EXPORT_OPTIONS_PLIST_B64 }}
        run: |
          if [[ -z "${IOS_CERTIFICATE_P12_B64:-}" || -z "${IOS_CERTIFICATE_PASSWORD:-}" || -z "${IOS_PROVISIONING_PROFILE_B64:-}" || -z "${IOS_EXPORT_OPTIONS_PLIST_B64:-}" ]]; then
            echo "Missing iOS signing secrets for app branch deploy" >&2
            exit 1
          fi
          CERT_PATH="$RUNNER_TEMP/dist.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          echo "$IOS_CERTIFICATE_P12_B64" | base64 --decode > "$CERT_PATH"
          echo "$IOS_PROVISIONING_PROFILE_B64" | base64 --decode > "$PROFILE_PATH"
          echo "$IOS_EXPORT_OPTIONS_PLIST_B64" | base64 --decode > ios/ExportOptions.plist
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$IOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/"

      - name: Build signed iOS IPA
        run: flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

      - name: Upload iOS IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-${{ needs.prepare.outputs.version }}
          path: build/ios/ipa/*.ipa

      - name: Upload iOS build to TestFlight
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_B64: ${{ secrets.APP_STORE_CONNECT_API_KEY_B64 }}
        run: |
          if [[ -z "${APP_STORE_CONNECT_KEY_ID:-}" || -z "${APP_STORE_CONNECT_ISSUER_ID:-}" || -z "${APP_STORE_CONNECT_API_KEY_B64:-}" ]]; then
            echo "Missing App Store Connect API secrets for TestFlight upload" >&2
            exit 1
          fi
          mkdir -p "$HOME/private_keys" "$HOME/.appstoreconnect/private_keys"
          KEY_PATH="$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
          echo "$APP_STORE_CONNECT_API_KEY_B64" | base64 --decode > "$KEY_PATH"
          IPA_PATH="$(find build/ios/ipa -name '*.ipa' | head -n 1)"
          xcrun altool --upload-app --type ios --file "$IPA_PATH" --apiKey "$APP_STORE_CONNECT_KEY_ID" --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

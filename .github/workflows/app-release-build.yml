name: Build App Release

on:
  push:
    tags:
      - app-v*

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  release-notes:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      release_notes_source: ${{ steps.render_en.outputs.release_notes_source }}
      release_notes_source_ru: ${{ steps.render_ru.outputs.release_notes_source }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#app-v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Render release notes (EN)
        id: render_en
        run: |
          chmod +x tool/render_release_notes.sh
          mkdir -p build/release_notes
          tool/render_release_notes.sh "${{ steps.version.outputs.version }}" --lang en > build/release_notes/release_notes_en.md

      - name: Render release notes (RU)
        id: render_ru
        run: |
          chmod +x tool/render_release_notes.sh
          mkdir -p build/release_notes
          tool/render_release_notes.sh "${{ steps.version.outputs.version }}" --lang ru > build/release_notes/release_notes_ru.md

      - name: Upload release notes artifact (EN)
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: build/release_notes/release_notes_en.md

      - name: Upload release notes artifact (RU)
        uses: actions/upload-artifact@v4
        with:
          name: release-notes-ru
          path: build/release_notes/release_notes_ru.md

  android:
    runs-on: ubuntu-latest
    needs: release-notes
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Materialize Android Firebase config
        env:
          ANDROID_GOOGLE_SERVICES_JSON_B64: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_B64 }}
        run: |
          if [[ -z "${ANDROID_GOOGLE_SERVICES_JSON_B64:-}" ]]; then
            echo "Missing secret ANDROID_GOOGLE_SERVICES_JSON_B64" >&2
            exit 1
          fi
          mkdir -p android/app
          echo "$ANDROID_GOOGLE_SERVICES_JSON_B64" | base64 --decode > android/app/google-services.json

      - name: Get dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  ios:
    runs-on: macos-latest
    needs: release-notes
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Materialize iOS Firebase config
        env:
          IOS_GOOGLE_SERVICE_INFO_PLIST_B64: ${{ secrets.IOS_GOOGLE_SERVICE_INFO_PLIST_B64 }}
        run: |
          if [[ -z "${IOS_GOOGLE_SERVICE_INFO_PLIST_B64:-}" ]]; then
            echo "Missing secret IOS_GOOGLE_SERVICE_INFO_PLIST_B64" >&2
            exit 1
          fi
          mkdir -p ios/Runner
          echo "$IOS_GOOGLE_SERVICE_INFO_PLIST_B64" | base64 --decode > ios/Runner/GoogleService-Info.plist

      - name: Get dependencies
        run: flutter pub get

      - name: Build iOS app
        run: flutter build ios --release --no-codesign

      - name: Pack iOS app artifact
        run: |
          cd build/ios/iphoneos
          zip -r Runner.app.zip Runner.app

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-runner-app
          path: build/ios/iphoneos/Runner.app.zip

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - release-notes
      - android
      - ios
    steps:
      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: build/release_notes

      - name: Download release notes (RU)
        uses: actions/download-artifact@v4
        with:
          name: release-notes-ru
          path: build/release_notes

      - name: Prepare GitHub Release body with RU notes link
        env:
          REPOSITORY: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          RU_URL="https://github.com/${REPOSITORY}/releases/download/${TAG_NAME}/release_notes_ru.md"
          cp build/release_notes/release_notes_en.md build/release_notes/release_notes_release.md
          {
            echo
            echo "## Localized Notes"
            echo
            echo "- Russian release notes: [release_notes_ru.md](${RU_URL})"
          } >> build/release_notes/release_notes_release.md

      - name: Append release notes to workflow summary
        run: |
          {
            echo "## Release Notes Rendering"
            echo
            echo "- EN template source: \`.github/release-template.md\`"
            echo "- RU template source: \`.github/release-template-ru.md\`"
            echo "- EN rendered output: \`build/release_notes/release_notes_en.md\`"
            echo "- RU rendered output: \`build/release_notes/release_notes_ru.md\`"
            echo "- GitHub Release body: \`build/release_notes/release_notes_release.md\`"
            echo
            echo "## Release Notes (EN)"
            echo
            echo "- Version: \`${{ needs.release-notes.outputs.version }}\`"
            echo "- Source: \`${{ needs.release-notes.outputs.release_notes_source || 'CHANGELOG' }}\`"
            echo
            cat build/release_notes/release_notes_en.md
            echo
            echo "## Release Notes (RU)"
            echo
            echo "- Version: \`${{ needs.release-notes.outputs.version }}\`"
            echo "- Source: \`${{ needs.release-notes.outputs.release_notes_source_ru || 'CHANGELOG' }}\`"
            echo
            cat build/release_notes/release_notes_ru.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: artifacts/android

      - name: Download iOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-runner-app
          path: artifacts/ios

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: build/release_notes/release_notes_release.md
          files: |
            artifacts/android/app-release.apk
            artifacts/ios/Runner.app.zip
            build/release_notes/release_notes_ru.md
